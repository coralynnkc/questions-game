<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#F7F2EA">
  <title>We're Not Really Strangers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ══════════════════════════════
       WELCOME SCREEN
  ══════════════════════════════ -->
  <div id="screen-welcome" class="screen active">
    <div class="welcome-inner">
      <p class="brand-eyebrow">we're not really</p>
      <h1 class="brand-title">Strangers</h1>
      <p class="brand-sub">A purposeful card game about deepening connections.</p>
      <button class="btn btn-primary" onclick="startGame()">Start Game</button>
    </div>
  </div>

  <!-- ══════════════════════════════
       NAMES SCREEN
  ══════════════════════════════ -->
  <div id="screen-names" class="screen">
    <div class="names-inner">
      <p class="cat-eyebrow">Who's playing?</p>
      <div id="names-list" class="names-list"></div>
      <button class="btn-add-player" onclick="addPlayer()">+ Add Player</button>
      <button class="btn btn-primary" onclick="submitNames()">Continue</button>
    </div>
  </div>

  <!-- ══════════════════════════════
       GAME SCREEN
  ══════════════════════════════ -->
  <div id="screen-game" class="screen">

    <!-- Pick-a-level view -->
    <div id="pick-view" class="pick-view">
      <p class="pick-turn" id="pick-turn">Sarah</p>
      <p class="pick-answerer" id="pick-answerer">asks Mike</p>
      <p class="pick-prompt">Choose a level</p>
      <div class="pick-grid" id="pick-grid"></div>
      <button class="cat-final-btn" onclick="showFinalCard()">End Game</button>
    </div>

    <!-- Card view -->
    <div id="card-view" class="card-view hidden">

      <header class="game-header">
        <span class="progress-text" id="turn-label">Sarah</span>
        <span class="level-chip" id="level-chip">Level 1</span>
      </header>

      <main class="card-stage">
        <div class="card-wrap" id="card-wrap" onclick="flipCard()">
          <div class="card-inner" id="card-inner">
            <div class="card-side card-down">
              <span class="card-brand-mark">WNRS</span>
            </div>
            <div class="card-side card-up" id="card-up">
              <span class="card-label" id="card-label"></span>
              <p class="card-body" id="card-body"></p>
            </div>
          </div>
        </div>
        <p class="tap-hint" id="tap-hint">Tap to reveal</p>
      </main>

      <footer class="game-footer">
        <button class="btn btn-advance" id="btn-next-turn" onclick="nextTurn()">
          Next Turn →
        </button>
      </footer>

    </div>
  </div>

  <!-- ══════════════════════════════
       FINAL CARD SCREEN
  ══════════════════════════════ -->
  <div id="screen-final" class="screen">
    <div class="final-inner">
      <span class="final-ornament">✦</span>
      <h2 class="final-title">Final Card</h2>
      <p class="final-body" id="final-body"></p>
      <button class="btn btn-primary" onclick="restartGame()">Play Again</button>
    </div>
  </div>

  <script src="questions.js"></script>
  <script src="script.js"></script>
</body>
</html>
